name: real-acceptance-validation

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install validation dependencies
        run: python -m pip install -r requirements.txt
      - name: Download fixed starter acceptance set
        run: python scripts/download_real_acceptance_set.py | tee real_acceptance_download.log
      - name: Validate manifest and checksums
        run: python scripts/validate_real_acceptance_set.py | tee real_acceptance_validation.log
      - name: Upload validation logs
        uses: actions/upload-artifact@v4
        with:
          name: real-acceptance-validation-logs
          path: |
            real_acceptance_download.log
            real_acceptance_validation.log
            data/ocsr_real_acceptance/download_metadata.json
