name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-documents.txt
      - name: Compile Python sources
        run: python -m compileall src scripts tests
      - name: Run tests
        env:
          MPLBACKEND: Agg
        run: python -m pytest -q

  real-acceptance-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install validation dependencies
        run: python -m pip install -r requirements.txt
      - name: Download deterministic starter acceptance images
        run: python scripts/download_real_acceptance_set.py
      - name: Validate starter acceptance manifest
        run: python scripts/validate_real_acceptance_set.py
